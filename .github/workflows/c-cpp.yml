name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install build dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential libncurses5-dev libncursesw5-dev

    - name: Build with install.sh (build-only)
      run: |
        chmod +x install.sh
        ./install.sh build-only

    - name: Verify binary
      run: |
        ./logscan --help || true

    - name: Run tests (if Makefile defines them)
      run: |
        make check || echo "No tests defined"
